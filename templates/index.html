<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection Website</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <h1>Smart Bin AI - Object Detection System</h1>
    

    <p class="subtitle">
        Live Waste Detection | Smart Classification | AI Monitoring
    </p>
    <div class="status-panel"></div>
        <div class="analytics-panel">
            <div class="analytics-box">Objects Detected: Live</div>
            <div class="analytics-box" id="systemStatus">System Status: Monitoring</div>
        </div>
        <div class="button-panel">
            <button onclick="startDetection()">Start Detection</button>
            <button onclick="stopDetection()">Stop Detection</button>
        </div>
        <div class="status-box">Waste Monitoring: Active</div>
      <div class="status-box">Segregation: Enabled</div>
        
        
        <div class="camera-section">

    
            <div class="camera-container">
                <video id="videoFeed" autoplay playsinline></video>
                <canvas id="overlay"></canvas>
                <p id="statusMessage" style="display:none;">Detection Stopped</p>
            </div>
        

        
    </div>
    <footer>
        Built by Sarvagya shukla
    </footer>
    <script>
        const videoFeed = document.getElementById("videoFeed");
        const canvas = document.getElementById("overlay");
        const ctx = canvas.getContext("2d");
    
        let model;
    
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: true
            });
    
            videoFeed.srcObject = stream;
    
            return new Promise((resolve) => {
                videoFeed.onloadedmetadata = () => {
                    videoFeed.play();
    
                    canvas.width = videoFeed.videoWidth;
                    canvas.height = videoFeed.videoHeight;
    
                    resolve();
                };
            });
        }
    
        async function detectObjects() {
            const predictions = await model.detect(videoFeed);
            console.log(predictions);
    
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "red";
ctx.lineWidth = 4;
ctx.strokeRect(50, 50, 200, 200);

ctx.fillStyle = "red";
ctx.font = "30px Arial";
ctx.fillText("TEST BOX", 60, 45);
    
            predictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
    
                ctx.strokeStyle = "lime";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, width, height);
    
                ctx.fillStyle = "lime";
ctx.font = "20px Arial";
ctx.fillRect(x, y - 25, prediction.class.length * 12, 25);

ctx.fillStyle = "black";
ctx.fillText(
    prediction.class,
                    x,
                    y > 10 ? y - 5 : 10
                );
            });
    
            requestAnimationFrame(detectObjects);
        }
    
        async function startDetection() {
            await setupCamera();
    
            model = await cocoSsd.load();
    
            detectObjects();
        }
    
        function stopDetection() {
            const stream = videoFeed.srcObject;
    
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
    
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    
        startDetection();
    </script>

</body>
</html>
