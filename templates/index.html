<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Detection Website</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script defer src="https://unpkg.com/face-api.js"></script>
</head>
<body>

    <h1>Smart Bin AI - Object Detection System</h1>
    

    <p class="subtitle">
        Live Waste Detection | Smart Classification | AI Monitoring
    </p>
    <div class="status-panel"></div>
        <div class="analytics-panel">
            <div class="analytics-box">Objects Detected: Live</div>
            <div class="analytics-box" id="systemStatus">System Status: Monitoring</div>
        </div>
        <div class="button-panel">
            <button onclick="registerFace()">Register Face</button>
            <button onclick="startDetection()">Start Detection</button>
            <button onclick="stopDetection()">Stop Detection</button>
        </div>
        <div class="status-box">Waste Monitoring: Active</div>
      <div class="status-box">Segregation: Enabled</div>
        
        
        <div class="camera-section">

    
            <div class="camera-container">
                <video id="videoFeed" autoplay playsinline></video>
                <canvas id="overlay"></canvas>
                <p id="statusMessage" style="display:none;">Detection Stopped</p>
            </div>
        

        
    </div>
    <footer>
        Built by Sarvagya shukla
    </footer>
    <script>
        const videoFeed = document.getElementById("videoFeed");
        const canvas = document.getElementById("overlay");
        const ctx = canvas.getContext("2d");
    
        let model;
        let faceMatcher;
let labeledDescriptors = [];
    
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: true
            });
    
            videoFeed.srcObject = stream;
    
            return new Promise((resolve) => {
                videoFeed.onloadedmetadata = () => {
                    videoFeed.play();
    
                    canvas.width = videoFeed.clientWidth;
                    canvas.height = videoFeed.clientHeight;
    
                    resolve();
                };
            });
        }
        async function loadFaceModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('/static/models');
await faceapi.nets.faceLandmark68Net.loadFromUri('/static/models');
await faceapi.nets.faceRecognitionNet.loadFromUri('/static/models');
}

async function registerFace() {
    if (!videoFeed.srcObject) {
        alert("Please start camera first.");
        return;
    }

    if (typeof faceapi === "undefined") {
        alert("Face recognition system not loaded.");
        return;
    }

    const name = prompt("Enter your name:");

    if (!name) return;

    const detection = await faceapi
        .detectSingleFace(
            videoFeed,
            new faceapi.TinyFaceDetectorOptions()
        )
        .withFaceLandmarks()
        .withFaceDescriptor();

    console.log("REGISTER DETECTION:", detection);

    if (!detection || !detection.descriptor) {
        alert("No clear face detected. Please look at the camera and try again.");
        return;
    }

    const savedData = {
        label: name,
        descriptor: Array.from(detection.descriptor)
    };

    localStorage.setItem(
        "registeredFace",
        JSON.stringify(savedData)
    );

    alert("Face registered successfully!");
}

   
async function detectObjects() {
    const predictions = await model.detect(videoFeed);
    console.log(predictions);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // FACE RECOGNITION
    const savedFace = JSON.parse(localStorage.getItem("registeredFace"));

    if (savedFace && typeof faceapi !== "undefined") {
        const detection = await faceapi
            .detectSingleFace(
                videoFeed,
                new faceapi.TinyFaceDetectorOptions()
            )
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (detection && detection.descriptor) {
            const labeledDescriptor = new faceapi.LabeledFaceDescriptors(
                savedFace.label,
                [new Float32Array(savedFace.descriptor)]
            );

            const matcher = new faceapi.FaceMatcher(
                [labeledDescriptor],
                0.6
            );

            const bestMatch = matcher.findBestMatch(
                detection.descriptor
            );

            if (bestMatch.label !== "unknown") {
                const box = detection.detection.box;

                ctx.strokeStyle = "blue";
                ctx.lineWidth = 3;

                ctx.strokeRect(
                    box.x,
                    box.y,
                    box.width,
                    box.height
                );

                ctx.fillStyle = "blue";
                ctx.font = "24px Arial";

                ctx.fillText(
                    bestMatch.label,
                    box.x,
                    box.y - 10
                );
            }
        }
    }

    // OBJECT DETECTION
    predictions.forEach(prediction => {
        const [x, y, width, height] = prediction.bbox;

        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;

        ctx.strokeRect(
            x,
            y,
            width,
            height
        );

        ctx.fillStyle = "lime";
        ctx.font = "20px Arial";

        ctx.fillRect(
            x,
            y - 25,
            prediction.class.length * 12,
            25
        );

        ctx.fillStyle = "black";

        ctx.fillText(
            prediction.class,
            x,
            y - 5
        );
    });

    requestAnimationFrame(detectObjects);
}
           
    
    
        async function startDetection() {
            await setupCamera();
            await loadFaceModels();
    
            model = await cocoSsd.load();
    
            detectObjects();
        }
    
        function stopDetection() {
            const stream = videoFeed.srcObject;
    
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
    
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    
        startDetection();
    </script>

</body>
</html>
